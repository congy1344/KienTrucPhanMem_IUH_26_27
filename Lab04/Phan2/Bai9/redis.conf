# ==========================================
# Cau hinh Redis tuy chinh
# ==========================================

# Cho phep ket noi tu tat ca cac dia chi IP (mac dinh chi localhost)
bind 0.0.0.0

# Cong lang nghe
port 6379

# Dat mat khau xac thuc
requirepass redis123

# Tat che do daemon (bat buoc voi Docker, phai chay foreground)
daemonize no

# Ghi log ra stdout de Docker co the doc duoc
loglevel notice
logfile ""

# Luu du lieu dinh ky ra disk (RDB snapshot)
# save <giay> <so-thay-doi>
save 900 1
save 300 10
save 60 10000

# Ten file luu tru du lieu
dbfilename dump.rdb

# Thu muc luu tru du lieu
dir /data

# Gioi han bo nho toi da su dung
maxmemory 128mb

# Chinh sach xoa key khi day bo nho (xoa key it dung nhat gan day)
maxmemory-policy allkeys-lru

# So database (mac dinh 16)
databases 16
