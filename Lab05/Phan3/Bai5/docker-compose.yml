version: '3.8'

services:
  vote:
    image: dockersamples/examplevotingapp_vote
    container_name: vote_frontend
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier

  result:
    image: dockersamples/examplevotingapp_result
    container_name: result_backend
    ports:
      - "5001:80"
    networks:
      - front-tier
      - back-tier

  worker:
    image: dockersamples/examplevotingapp_worker
    container_name: worker_processor
    depends_on:
      - redis
      - db
    networks:
      - back-tier

  redis:
    image: redis:alpine
    container_name: redis_queue
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - back-tier

networks:
  front-tier:
  back-tier:
