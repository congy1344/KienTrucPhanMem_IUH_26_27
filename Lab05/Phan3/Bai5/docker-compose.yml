version: '3.8'

services:
  vote:
    image: python:3.9-slim
    container_name: vote_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./vote:/app
    command: bash -c "pip install flask && python app.py"
    ports:
      - "5000:5000"
    networks:
      - voting_net

  result:
    image: node:18-alpine
    container_name: result_backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./result:/app
    command: bash -c "npm install && node index.js"
    ports:
      - "5001:5001"
    depends_on:
      - redis
    networks:
      - voting_net

  redis:
    image: redis:7-alpine
    container_name: redis_service
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - voting_net
    volumes:
      - redis_data:/data

  worker:
    image: openjdk:17-jdk-alpine
    container_name: java_worker
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./worker:/app
    command: bash -c "./gradlew run"
    depends_on:
      - redis
      - postgres
    networks:
      - voting_net

  postgres:
    image: postgres:13-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voting_user
      POSTGRES_PASSWORD: voting_pass
      POSTGRES_DB: voting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voting_net

volumes:
  redis_data:
  postgres_data:

networks:
  voting_net:
    driver: bridge
