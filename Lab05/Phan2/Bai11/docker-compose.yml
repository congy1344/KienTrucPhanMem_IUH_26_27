version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bai11-postgres
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: bai11-adminer
    ports:
      - "8083:8080"
    depends_on:
      - postgres
