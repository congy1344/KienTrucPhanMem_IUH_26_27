version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bai08-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  nodejs-app:
    build: ./app
    container_name: bai08-nodejs
    ports:
      - "3000:3000"
    depends_on:
      - mysql
